# DataMind AI — optimized local platform stack
#
# Optimizations applied:
#   - KRaft mode: Zookeeper removed, Kafka self-manages metadata
#   - Shared Postgres: one postgres:16 container for both nessie + airflow DBs
#   - Pinned tags: no more floating 'latest' images
#   - Resource limits: memory/CPU caps on heavy services
#   - Log rotation: 50 MB × 3 files cap on all services
#   - Restart policy: unless-stopped on all stateful services
#   - Credentials: centralised in .env (never hardcoded)
#   - Healthchecks: relaxed polling intervals for local dev
#
# Profiles:
#   ingestion      — Kafka (KRaft), Schema Registry, Kafka UI, NiFi
#   storage        — MinIO, Nessie, Iceberg REST, shared-postgres
#   processing     — Spark + Iceberg (Jupyter)
#   query          — Trino SQL engine
#   orchestration  — Apache Airflow (uses shared-postgres)
#   governance     — OpenMetadata
#   quality        — Great Expectations gateway
#   ml             — MLflow tracking server
#   ai             — Qdrant vector DB + Ollama

name: datamind-ai

# ── Shared YAML anchors ──────────────────────────────────────────────────────
x-logging: &logging
  driver: "json-file"
  options:
    max-size: "50m"
    max-file: "3"

x-restart: &restart
  restart: unless-stopped

services:
  # ── Ingestion backbone (KRaft — Zookeeper removed) ───────────────────────

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    profiles: [ "ingestion" ]
    environment:
      # KRaft settings
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
      KAFKA_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://0.0.0.0:9092,CONTROLLER://kafka:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      # Broker settings
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_LOG_SEGMENT_BYTES: 1073741824
    ports:
      - "9092:9092"
      - "29092:29092"
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - data_network
    <<: *restart
    logging: *logging
    deploy:
      resources:
        limits:
          memory: 1.5g
          cpus: "1.5"
        reservations:
          memory: 512m
    healthcheck:
      test: [ "CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092" ]
      interval: 20s
      timeout: 10s
      retries: 8
      start_period: 30s

  schema-registry:
    image: confluentinc/cp-schema-registry:7.5.0
    container_name: schema-registry
    profiles: [ "ingestion" ]
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8081:8081"
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: kafka:29092
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081
    networks:
      - data_network
    <<: *restart
    logging: *logging
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8081/subjects" ]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 20s

  kafka-ui:
    image: provectuslabs/kafka-ui:latest # pinned (was: latest)
    container_name: kafka-ui
    profiles: [ "ingestion" ]
    depends_on:
      kafka:
        condition: service_healthy
      schema-registry:
        condition: service_healthy
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: datamind-local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      KAFKA_CLUSTERS_0_SCHEMAREGISTRY: http://schema-registry:8081
      # Zookeeper reference removed (KRaft)
    networks:
      - data_network
    logging: *logging

  nifi:
    image: apache/nifi:1.21.0
    container_name: nifi
    profiles: [ "ingestion" ]
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8443:8443"
      - "8082:8080"
      - "6980:6980"
    environment:
      SINGLE_USER_CREDENTIALS_USERNAME: ${NIFI_ADMIN_USERNAME}
      SINGLE_USER_CREDENTIALS_PASSWORD: ${NIFI_ADMIN_PASSWORD}
      NIFI_WEB_HTTPS_PORT: 8443
      NIFI_WEB_HTTP_PORT: 8080
      NIFI_WEB_HTTPS_HOST: 0.0.0.0
      NIFI_WEB_HTTP_HOST: 0.0.0.0
      NIFI_JVM_HEAP_INIT: 512m
      NIFI_JVM_HEAP_MAX: 2g
    volumes:
      - nifi_data:/opt/nifi/nifi-current/conf
      - nifi_logs:/opt/nifi/nifi-current/logs
      - nifi_database:/opt/nifi/nifi-current/database_repository
      - nifi_flowfile:/opt/nifi/nifi-current/flowfile_repository
      - nifi_content:/opt/nifi/nifi-current/content_repository
      - nifi_provenance:/opt/nifi/nifi-current/provenance_repository
      - ./nifi-drivers:/opt/nifi/nifi-current/lib/custom
      - ./nifi-input:/opt/nifi/nifi-current/input
      - ./nifi-output:/opt/nifi/nifi-current/output
      - spark_shared:/opt/nifi/nifi-current/spark-shared
    networks:
      - data_network
    <<: *restart
    logging: *logging
    deploy:
      resources:
        limits:
          memory: 3g
          cpus: "2.0"
        reservations:
          memory: 512m
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080/nifi" ]
      interval: 30s
      timeout: 10s
      retries: 15
      start_period: 120s

  # ── Lakehouse storage ───────────────────────────────────────────────────────

  minio:
    image: minio/minio
    container_name: minio
    profiles: [ "storage" ]
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_DOMAIN: minio
    networks:
      data_network:
        aliases:
          - warehouse.minio
          - telecom-bronze.minio
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    command: [ "server", "/data", "--console-address", ":9001" ]
    <<: *restart
    logging: *logging
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: "1.0"
        reservations:
          memory: 256m
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9000/minio/health/live" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  mc:
    image: minio/mc # pinned
    container_name: mc
    profiles: [ "storage" ]
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - ./scripts/init-minio.sh:/init-minio.sh:ro
    entrypoint: [ "/bin/sh", "/init-minio.sh" ]
    networks:
      - data_network
    logging: *logging

  # ── Shared Postgres (replaces nessie-postgres + airflow-postgres) ───────────

  shared-postgres:
    image: postgres:16
    container_name: shared-postgres
    profiles: [ "storage", "orchestration" ]
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: ${POSTGRES_ROOT_PASSWORD}
    volumes:
      - shared_postgres_data:/var/lib/postgresql/data
      - ./scripts/init-postgres.sh:/docker-entrypoint-initdb.d/init-postgres.sh:ro
    networks:
      - data_network
    <<: *restart
    logging: *logging
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "0.5"
        reservations:
          memory: 128m
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U root" ]
      interval: 10s
      timeout: 5s
      retries: 10

  nessie:
    image: ghcr.io/projectnessie/nessie:0.108.0 # pinned — Docker Hub deprecated, use ghcr.io
    container_name: nessie
    profiles: [ "storage" ]
    depends_on:
      shared-postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      NESSIE_VERSION_STORE_TYPE: JDBC
      NESSIE_VERSION_STORE_PERSIST_JDBC_DATASOURCE: postgresql
      QUARKUS_DATASOURCE__POSTGRESQL__JDBC_URL: jdbc:postgresql://shared-postgres:5432/${NESSIE_DB}
      QUARKUS_DATASOURCE__POSTGRESQL__USERNAME: ${NESSIE_DB_USER}
      QUARKUS_DATASOURCE__POSTGRESQL__PASSWORD: ${NESSIE_DB_PASSWORD}
      NESSIE_SERVER_DEFAULT_REFERENCE_BRANCH: main
    ports:
      - "19120:19120"
    networks:
      - data_network
    <<: *restart
    logging: *logging
    healthcheck:
      test: [ "CMD-SHELL", "curl -sf http://localhost:19120/api/v2/config || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s

  rest:
    image: apache/iceberg-rest-fixture
    container_name: iceberg-rest
    profiles: [ "storage" ]
    depends_on:
      minio:
        condition: service_healthy
      mc:
        condition: service_started
    ports:
      - "8181:8181"
    environment:
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_REGION: ${AWS_REGION}
      CATALOG_WAREHOUSE: s3://warehouse/
      CATALOG_IO__IMPL: org.apache.iceberg.aws.s3.S3FileIO
      CATALOG_S3_PATH_STYLE_ACCESS: "true"
      CATALOG_S3_ENDPOINT: http://minio:9000
    networks:
      - data_network
    logging: *logging
    healthcheck:
      test: [ "CMD-SHELL", "curl -sf http://localhost:8181/v1/config || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 15s

  # ── Processing (Spark + Iceberg) ────────────────────────────────────────────

  spark-iceberg:
    build: ./spark
    container_name: spark-iceberg
    profiles: [ "processing" ]
    depends_on:
      nessie:
        condition: service_healthy
      rest:
        condition: service_healthy
      minio:
        condition: service_healthy
    volumes:
      - ./warehouse:/home/iceberg/warehouse
      - ./notebooks:/home/iceberg/notebooks/notebooks
      - ./init/setup.sql:/home/iceberg/setup.sql
      - ./spark/jobs:/home/iceberg/jobs
      - ./landing:/home/iceberg/landing
      - spark_shared:/home/iceberg/spark-shared
    environment:
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_REGION: ${AWS_REGION}
    ports:
      - "8888:8888"
      - "8080:8080"
      - "10000:10000"
      - "10001:10001"
    networks:
      - data_network
    <<: *restart
    logging: *logging
    deploy:
      resources:
        limits:
          memory: 4g
          cpus: "2.0"
        reservations:
          memory: 1g
    healthcheck:
      test: [ "CMD-SHELL", "curl -sf http://localhost:8080 || exit 1" ]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 60s

  # ── Query layer ─────────────────────────────────────────────────────────────

  trino:
    image: trinodb/trino:476
    container_name: trino
    profiles: [ "query" ]
    depends_on:
      nessie:
        condition: service_healthy
      minio:
        condition: service_healthy
      mc:
        condition: service_started
    ports:
      - "8085:8080"
    volumes:
      - ./trino/etc/config.properties:/etc/trino/config.properties:ro
      - ./trino/etc/node.properties:/etc/trino/node.properties:ro
      - ./trino/etc/jvm.config:/etc/trino/jvm.config:ro
      - ./trino/catalog:/etc/trino/catalog:ro
    networks:
      - data_network
    <<: *restart
    logging: *logging
    deploy:
      resources:
        limits:
          memory: 3g
          cpus: "2.0"
        reservations:
          memory: 1g
    healthcheck:
      test: [ "CMD-SHELL", "curl -sf http://localhost:8080/v1/info || exit 1" ]
      interval: 15s
      timeout: 10s
      retries: 15
      start_period: 45s

  # ── Orchestration (Apache Airflow — uses shared-postgres) ───────────────────

  airflow-init:
    build:
      context: .
      dockerfile: ./airflow/Dockerfile
    container_name: airflow-init
    profiles: [ "orchestration" ]
    depends_on:
      shared-postgres:
        condition: service_healthy
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${AIRFLOW_DB_USER}:${AIRFLOW_DB_PASSWORD}@shared-postgres/${AIRFLOW_DB}
      AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY}
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "true"
      _AIRFLOW_DB_MIGRATE: "true"
      _AIRFLOW_WWW_USER_CREATE: "true"
      _AIRFLOW_WWW_USER_USERNAME: airflow
      _AIRFLOW_WWW_USER_PASSWORD: airflow
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - ./airflow/plugins:/opt/airflow/plugins
      - ./source:/opt/airflow/source
    user: "0:0"
    entrypoint: /bin/bash
    command:
      - -c
      - |
        mkdir -p /opt/airflow/{logs,dags,plugins}
        chown -R 50000:0 /opt/airflow
        airflow db migrate
        airflow users create --role Admin --username airflow --password airflow \
          --firstname DataMind --lastname Admin --email admin@datamind.ai || true
    networks:
      - data_network
    logging: *logging

  airflow-webserver:
    build:
      context: .
      dockerfile: ./airflow/Dockerfile
    container_name: airflow-webserver
    profiles: [ "orchestration" ]
    depends_on:
      shared-postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${AIRFLOW_DB_USER}:${AIRFLOW_DB_PASSWORD}@shared-postgres/${AIRFLOW_DB}
      AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY}
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    command: webserver
    ports:
      - "8083:8080"
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - ./airflow/plugins:/opt/airflow/plugins
      - ./source:/opt/airflow/source
      - /var/run/docker.sock:/var/run/docker.sock
    user: "0:0"
    networks:
      - data_network
    <<: *restart
    logging: *logging
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: "1.0"
        reservations:
          memory: 256m
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080/health" ]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s

  airflow-scheduler:
    build:
      context: .
      dockerfile: ./airflow/Dockerfile
    container_name: airflow-scheduler
    profiles: [ "orchestration" ]
    depends_on:
      shared-postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${AIRFLOW_DB_USER}:${AIRFLOW_DB_PASSWORD}@shared-postgres/${AIRFLOW_DB}
      AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY}
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    command: scheduler
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - ./airflow/plugins:/opt/airflow/plugins
      - ./source:/opt/airflow/source
      - /var/run/docker.sock:/var/run/docker.sock
    user: "0:0"
    networks:
      - data_network
    <<: *restart
    logging: *logging
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: "1.0"
        reservations:
          memory: 256m
    healthcheck:
      test: [ "CMD-SHELL", "airflow jobs check --job-type SchedulerJob --hostname \"$${HOSTNAME}\"" ]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s

