# DataMind AI — local platform stack
#
# Profiles:
#   ingestion      — Kafka, Zookeeper, Schema Registry, Kafka UI, NiFi
#   storage        — MinIO, Nessie, Iceberg REST fixture
#   processing     — Spark + Iceberg (Jupyter)
#   query          — Trino SQL engine
#   orchestration  — Apache Airflow
#   governance     — OpenMetadata (catalog & lineage)
#   quality        — Great Expectations gateway
#   ml             — MLflow tracking server
#   ai             — Qdrant vector DB + Ollama (local LLM)
#
# Start everything:
#   ./scripts/up.sh
#
# Smoke test:
#   ./scripts/smoke-test.sh --strict
#   ./scripts/smoke-test.sh --profile orchestration

name: datamind-ai

services:
  # ── Ingestion backbone ──────────────────────────────────────────────────────

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    profiles: ["ingestion"]
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      ZOOKEEPER_SYNC_LIMIT: 2
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
      - zookeeper_logs:/var/lib/zookeeper/log
    networks:
      - data_network
    healthcheck:
      test: ["CMD", "bash", "-c", "echo srvr | nc localhost 2181 | grep -q Mode"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    profiles: ["ingestion"]
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_LOG_SEGMENT_BYTES: 1073741824
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - data_network
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  schema-registry:
    image: confluentinc/cp-schema-registry:7.5.0
    container_name: schema-registry
    profiles: ["ingestion"]
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8081:8081"
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: kafka:29092
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081
    networks:
      - data_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/subjects"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 20s

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    profiles: ["ingestion"]
    depends_on:
      kafka:
        condition: service_healthy
      schema-registry:
        condition: service_healthy
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: datamind-local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181
      KAFKA_CLUSTERS_0_SCHEMAREGISTRY: http://schema-registry:8081
    networks:
      - data_network

  nifi:
    image: apache/nifi:1.21.0
    container_name: nifi
    profiles: ["ingestion"]
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8443:8443"
      - "8082:8080"
      - "6980:6980"
    environment:
      SINGLE_USER_CREDENTIALS_USERNAME: admin
      SINGLE_USER_CREDENTIALS_PASSWORD: ctsBtRBKHRAx69EqUghvvgEvjnaLjFEB
      NIFI_WEB_HTTPS_PORT: 8443
      NIFI_WEB_HTTP_PORT: 8080
      NIFI_WEB_HTTPS_HOST: 0.0.0.0
      NIFI_WEB_HTTP_HOST: 0.0.0.0
      NIFI_JVM_HEAP_INIT: 512m
      NIFI_JVM_HEAP_MAX: 2g
    volumes:
      - nifi_data:/opt/nifi/nifi-current/conf
      - nifi_logs:/opt/nifi/nifi-current/logs
      - nifi_database:/opt/nifi/nifi-current/database_repository
      - nifi_flowfile:/opt/nifi/nifi-current/flowfile_repository
      - nifi_content:/opt/nifi/nifi-current/content_repository
      - nifi_provenance:/opt/nifi/nifi-current/provenance_repository
      - ./nifi-drivers:/opt/nifi/nifi-current/lib/custom
      - ./nifi-input:/opt/nifi/nifi-current/input
      - ./nifi-output:/opt/nifi/nifi-current/output
      - spark_shared:/opt/nifi/nifi-current/spark-shared
    networks:
      - data_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/nifi"]
      interval: 30s
      timeout: 10s
      retries: 15
      start_period: 120s

  # ── Lakehouse storage ───────────────────────────────────────────────────────

  minio:
    image: minio/minio
    container_name: minio
    profiles: ["storage"]
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password
      MINIO_DOMAIN: minio
    networks:
      data_network:
        aliases:
          - warehouse.minio
          - telecom-bronze.minio
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    command: ["server", "/data", "--console-address", ":9001"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  mc:
    image: minio/mc
    container_name: mc
    profiles: ["storage"]
    depends_on:
      minio:
        condition: service_healthy
    volumes:
      - ./scripts/init-minio.sh:/init-minio.sh:ro
    entrypoint: ["/bin/sh", "/init-minio.sh"]
    networks:
      - data_network

  nessie-postgres:
    image: postgres:16
    container_name: nessie-postgres
    profiles: ["storage"]
    environment:
      POSTGRES_DB: nessie
      POSTGRES_USER: nessie
      POSTGRES_PASSWORD: nessie
    volumes:
      - nessie_db_data:/var/lib/postgresql/data
    networks:
      - data_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nessie -d nessie"]
      interval: 5s
      timeout: 5s
      retries: 20

  nessie:
    image: projectnessie/nessie:latest
    container_name: nessie
    profiles: ["storage"]
    depends_on:
      nessie-postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      NESSIE_VERSION_STORE_TYPE: JDBC
      NESSIE_VERSION_STORE_PERSIST_JDBC_DATASOURCE: postgresql
      QUARKUS_DATASOURCE_JDBC_URL: jdbc:postgresql://nessie-postgres:5432/nessie
      QUARKUS_DATASOURCE_USERNAME: nessie
      QUARKUS_DATASOURCE_PASSWORD: nessie
      NESSIE_SERVER_DEFAULT_REFERENCE_BRANCH: main
    ports:
      - "19120:19120"
    networks:
      - data_network
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:19120/api/v2/config || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s

  rest:
    image: apache/iceberg-rest-fixture
    container_name: iceberg-rest
    profiles: ["storage"]
    depends_on:
      minio:
        condition: service_healthy
      mc:
        condition: service_started
    ports:
      - "8181:8181"
    environment:
      AWS_ACCESS_KEY_ID: admin
      AWS_SECRET_ACCESS_KEY: password
      AWS_REGION: us-east-1
      CATALOG_WAREHOUSE: s3://warehouse/
      CATALOG_IO__IMPL: org.apache.iceberg.aws.s3.S3FileIO
      CATALOG_S3_PATH_STYLE_ACCESS: "true"
      CATALOG_S3_ENDPOINT: http://minio:9000
    networks:
      - data_network
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8181/v1/config || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 15s

  # ── Processing (Spark + Iceberg) ────────────────────────────────────────────

  spark-iceberg:
    image: tabulario/spark-iceberg
    container_name: spark-iceberg
    profiles: ["processing"]
    depends_on:
      rest:
        condition: service_healthy
      minio:
        condition: service_healthy
    volumes:
      - ./warehouse:/home/iceberg/warehouse
      - ./notebooks:/home/iceberg/notebooks/notebooks
      - ./init/setup.sql:/home/iceberg/setup.sql
      - ./spark/jobs:/home/iceberg/jobs
      - ./landing:/home/iceberg/landing
      - spark_shared:/home/iceberg/spark-shared
    environment:
      AWS_ACCESS_KEY_ID: admin
      AWS_SECRET_ACCESS_KEY: password
      AWS_REGION: us-east-1
    ports:
      - "8888:8888"
      - "8080:8080"
      - "10000:10000"
      - "10001:10001"
    networks:
      - data_network
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080 || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 60s

  # ── Query layer ─────────────────────────────────────────────────────────────

  trino:
    image: trinodb/trino:476
    container_name: trino
    profiles: ["query"]
    depends_on:
      nessie:
        condition: service_healthy
      minio:
        condition: service_healthy
      mc:
        condition: service_started
    ports:
      - "8085:8080"
    volumes:
      - ./trino/etc/config.properties:/etc/trino/config.properties:ro
      - ./trino/etc/node.properties:/etc/trino/node.properties:ro
      - ./trino/etc/jvm.config:/etc/trino/jvm.config:ro
      - ./trino/catalog:/etc/trino/catalog:ro
    networks:
      - data_network
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/v1/info || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 15
      start_period: 45s

  # ── Orchestration (Apache Airflow) ──────────────────────────────────────────

  airflow-postgres:
    image: postgres:16
    container_name: airflow-postgres
    profiles: ["orchestration"]
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - airflow_postgres_data:/var/lib/postgresql/data
    networks:
      - data_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow -d airflow"]
      interval: 5s
      timeout: 5s
      retries: 20

  airflow-init:
    image: apache/airflow:2.10.4-python3.11
    container_name: airflow-init
    profiles: ["orchestration"]
    depends_on:
      airflow-postgres:
        condition: service_healthy
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-postgres/airflow
      AIRFLOW__CORE__FERNET_KEY: 46BKJoQYlPPOexq0OhDZnLXN8zTopXNOCAS3h9gw9UiY=
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "true"
      _AIRFLOW_DB_MIGRATE: "true"
      _AIRFLOW_WWW_USER_CREATE: "true"
      _AIRFLOW_WWW_USER_USERNAME: airflow
      _AIRFLOW_WWW_USER_PASSWORD: airflow
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - ./airflow/plugins:/opt/airflow/plugins
    user: "0:0"
    entrypoint: /bin/bash
    command:
      - -c
      - |
        mkdir -p /opt/airflow/{logs,dags,plugins}
        chown -R 50000:0 /opt/airflow
        airflow db migrate
        airflow users create --role Admin --username airflow --password airflow \
          --firstname DataMind --lastname Admin --email admin@datamind.ai || true
    networks:
      - data_network

  airflow-webserver:
    image: apache/airflow:2.10.4-python3.11
    container_name: airflow-webserver
    profiles: ["orchestration"]
    depends_on:
      airflow-postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-postgres/airflow
      AIRFLOW__CORE__FERNET_KEY: 46BKJoQYlPPOexq0OhDZnLXN8zTopXNOCAS3h9gw9UiY=
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    command: webserver
    ports:
      - "8083:8080"
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - ./airflow/plugins:/opt/airflow/plugins
    user: "50000:0"
    networks:
      - data_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s

  airflow-scheduler:
    image: apache/airflow:2.10.4-python3.11
    container_name: airflow-scheduler
    profiles: ["orchestration"]
    depends_on:
      airflow-postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-postgres/airflow
      AIRFLOW__CORE__FERNET_KEY: 46BKJoQYlPPOexq0OhDZnLXN8zTopXNOCAS3h9gw9UiY=
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    command: scheduler
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - ./airflow/plugins:/opt/airflow/plugins
    user: "50000:0"
    networks:
      - data_network
    healthcheck:
      test: ["CMD-SHELL", "airflow jobs check --job-type SchedulerJob --hostname \"$${HOSTNAME}\""]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s

  # ── Governance (OpenMetadata) ───────────────────────────────────────────────

  openmetadata-mysql:
    image: docker.getcollate.io/openmetadata/db:1.5.0
    container_name: openmetadata-mysql
    profiles: ["governance"]
    command: "--sort_buffer_size=10M"
    environment:
      MYSQL_ROOT_PASSWORD: password
    volumes:
      - openmetadata_mysql_data:/var/lib/mysql
    networks:
      - data_network
    healthcheck:
      test: ["CMD-SHELL", "mysql --user=root --password=password --silent --execute 'use openmetadata_db'"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 30s

  openmetadata-elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.10.2
    container_name: openmetadata-elasticsearch
    profiles: ["governance"]
    environment:
      discovery.type: single-node
      ES_JAVA_OPTS: -Xms512m -Xmx512m
      xpack.security.enabled: "false"
    volumes:
      - openmetadata_es_data:/usr/share/elasticsearch/data
    networks:
      - data_network
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health | grep -qE 'green|yellow'"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 60s

  openmetadata-migrate:
    image: docker.getcollate.io/openmetadata/server:1.5.0
    container_name: openmetadata-migrate
    profiles: ["governance"]
    command: "./bootstrap/openmetadata-ops.sh migrate"
    env_file:
      - ./governance/openmetadata.env
    depends_on:
      openmetadata-mysql:
        condition: service_healthy
      openmetadata-elasticsearch:
        condition: service_healthy
    networks:
      - data_network
    restart: "no"

  openmetadata-server:
    image: docker.getcollate.io/openmetadata/server:1.5.0
    container_name: openmetadata-server
    profiles: ["governance"]
    env_file:
      - ./governance/openmetadata.env
    depends_on:
      openmetadata-migrate:
        condition: service_completed_successfully
    ports:
      - "8585:8585"
    networks:
      - data_network
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8585/api/v1/system/version || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 20
      start_period: 120s

  # ── Data quality (Great Expectations) ───────────────────────────────────────

  gx-gateway:
    build: ./services/gx-gateway
    container_name: gx-gateway
    profiles: ["quality"]
    ports:
      - "3000:3000"
    networks:
      - data_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ── ML platform (MLflow) ────────────────────────────────────────────────────

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.18.0
    container_name: mlflow
    profiles: ["ml"]
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri sqlite:///mlflow/mlflow.db
      --default-artifact-root s3://warehouse/mlflow/
    environment:
      AWS_ACCESS_KEY_ID: admin
      AWS_SECRET_ACCESS_KEY: password
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
    ports:
      - "5000:5000"
    volumes:
      - mlflow_data:/mlflow
    networks:
      - data_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  # ── AI layer (Qdrant + Ollama) ──────────────────────────────────────────────

  qdrant:
    image: qdrant/qdrant:v1.12.5
    container_name: qdrant
    profiles: ["ai"]
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - data_network
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:6333/healthz || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 15s

  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    profiles: ["ai"]
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - data_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 30s

networks:
  data_network:
    name: datamind_data_network

volumes:
  minio_data:
  nessie_db_data:
  nifi_data:
  nifi_logs:
  nifi_database:
  nifi_flowfile:
  nifi_content:
  nifi_provenance:
  zookeeper_data:
  zookeeper_logs:
  kafka_data:
  spark_shared:
  airflow_postgres_data:
  openmetadata_mysql_data:
  openmetadata_es_data:
  mlflow_data:
  qdrant_data:
  ollama_data:
