  # ── Semantic Layer (AI-powered analytics) ────────────────────────────────────

  semantic-layer:
    build: ./semantic-layer
    container_name: semantic-layer
    profiles: [ "analytics" ]
    ports:
      - "8000:8000"
    environment:
      TRINO_HOST: trino
      TRINO_PORT: 8080
      TRINO_CATALOG: iceberg
      TRINO_SCHEMA: gold
    depends_on:
      trino:
        condition: service_healthy
    networks:
      - data_network
    restart: unless-stopped
    logging: *logging
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/health" ]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ── Data quality (Great Expectations) ───────────────────────────────────────

  gx-gateway:
    build: ./services/gx-gateway
    container_name: gx-gateway
    profiles: [ "quality" ]
    ports:
      - "3000:3000"
    networks:
      - data_network
    logging: *logging
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:3000/health" ]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

networks:
  data_network:
    name: datamind_data_network

volumes:
  minio_data:
  nessie_db_data:
  nifi_data:
  nifi_logs:
  nifi_database:
  nifi_flowfile:
  nifi_content:
  nifi_provenance:
  kafka_data:
  spark_shared:
  shared_postgres_data: # replaces nessie_db_data + airflow_postgres_data
  openmetadata_mysql_data:
  openmetadata_es_data:
