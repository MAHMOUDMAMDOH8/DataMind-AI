dimensions:

  dim_date:
    label: Date
    description: Calendar date dimension for time-based analysis
    table: iceberg.gold.dim_date
    primary_key: date_sk
    fields:
      date_sk: {label: Date SK, type: string, description: Surrogate key for date joins}
      full_date: {label: Full Date, type: date, description: Calendar date}
      date: {label: Date, type: string, description: Date as YYYY-MM-DD string}
      year: {label: Year, type: integer, description: Calendar year}
      month: {label: Month, type: integer, description: Month number 01-12}
      day: {label: Day, type: integer, description: Day of month}
      day_name: {label: Day Name, type: category, description: Day of week name}
      day_of_week: {label: Day of Week, type: integer, description: Day of week 1=Sunday}
      is_weekend: {label: Is Weekend, type: boolean, description: 1 if weekend}
      day_of_year: {label: Day of Year, type: integer, description: Day number in year}
      quarter: {label: Quarter, type: integer, description: Calendar quarter 1-4}

  dim_time:
    label: Time
    description: Time of day dimension for intra-day analysis
    table: iceberg.gold.dim_time
    primary_key: time_key
    fields:
      time_key: {label: Time Key, type: integer, description: Minute of day 0-1439}
      time_value: {label: Time Value, type: string, description: Minute of day as string}
      hour: {label: Hour, type: string, description: Hour 00-23}
      minute: {label: Minute, type: string, description: Minute 00-59}
      am_pm: {label: AM/PM, type: category, description: AM or PM}
      time_24h: {label: Time 24h, type: string, description: Time in HH:MM format}

  dim_user_gold:
    label: User
    description: Customer master data dimension
    table: iceberg.gold.dim_user_gold
    primary_key: user_sk
    fields:
      user_sk: {label: User SK, type: integer, description: Surrogate key}
      msisdn: {label: Phone Number, type: string, description: Customer phone number}
      city: {label: City, type: category, description: Customer city}
      customer_type: {label: Customer Type, type: category, description: Prepaid or Postpaid}
      gender: {label: Gender, type: category, description: Customer gender}
      age_group: {label: Age Group, type: category, description: Customer age group}
      activation_date: {label: Activation Date, type: date, description: Account activation date}
      status: {label: Status, type: category, description: Account status}

  dim_device_gold:
    label: Device
    description: Mobile device master data dimension
    table: iceberg.gold.dim_device_gold
    primary_key: device_sk
    fields:
      device_sk: {label: Device SK, type: integer, description: Surrogate key}
      tac: {label: TAC, type: string, description: Type Allocation Code}
      brand: {label: Brand, type: category, description: Device manufacturer}
      model: {label: Model, type: string, description: Device model name}
      os: {label: OS, type: category, description: Operating system}
      is_smartphone: {label: Is Smartphone, type: boolean, description: Whether smartphone}

  dim_agent_gold:
    label: Agent
    description: Customer support agent dimension
    table: iceberg.gold.dim_agent_gold
    primary_key: agent_sk
    fields:
      agent_sk: {label: Agent SK, type: integer, description: Surrogate key}
      agent_id: {label: Agent ID, type: string, description: Agent identifier}
      name: {label: Name, type: string, description: Agent name}
      department: {label: Department, type: category, description: Agent department}
      city: {label: City, type: category, description: Agent city}
      status: {label: Status, type: category, description: Agent status}

  dim_cell_site_gold:
    label: Cell Site
    description: Network cell tower dimension
    table: iceberg.gold.dim_cell_site_gold
    primary_key: cell_sk
    fields:
      cell_sk: {label: Cell SK, type: integer, description: Surrogate key}
      cell_id: {label: Cell ID, type: string, description: Cell site identifier}
      site_name: {label: Site Name, type: string, description: Cell site name}
      city: {label: City, type: category, description: Cell site city}
      latitude: {label: Latitude, type: float, description: GPS latitude}
      longitude: {label: Longitude, type: float, description: GPS longitude}
