# ── OpenMetadata Ingestion: Iceberg Gold Layer ───────────────────────────────
# Registers all 9 gold mart tables from the Nessie catalog into OpenMetadata.
#
# Gold tables:
#   customer_360, daily_revenue, customer_usage_daily,
#   payment_analytics, recharge_analytics, roaming_analytics,
#   network_performance, support_analytics, fraud_monitoring
#
# Run inside the openmetadata-ingestion container:
#   metadata ingest -c /opt/workflows/iceberg-gold.yaml
# ─────────────────────────────────────────────────────────────────────────────

source:
  type: Iceberg
  serviceName: datamind-iceberg-gold
  serviceConnection:
    config:
      type: Iceberg
      connection:
        type: RestCatalog
        uri: http://nessie:19120/api/v1
        warehouse: s3://warehouse/
        fileSystem:
          type: S3
          accessKeyId: admin
          secretAccessKey: password
          endpoint: http://minio:9000
          pathStyleAccess: true
  sourceConfig:
    config:
      type: DatabaseMetadata
      databaseFilterPattern:
        includes:
          - "gold"
      schemaFilterPattern:
        includes:
          - ".*"
      tableFilterPattern:
        includes:
          - "customer_360"
          - "daily_revenue"
          - "customer_usage_daily"
          - "payment_analytics"
          - "recharge_analytics"
          - "roaming_analytics"
          - "network_performance"
          - "support_analytics"
          - "fraud_monitoring"
      includeViews: false
      includeTags: true
      markDeletedTables: true
      autoClassification: true

sink:
  type: metadata-rest
  config: {}

ingestionPipelineName: ingest-iceberg-gold

workflowConfig:
  loggerLevel: INFO
  openMetadataServerConfig:
    hostPort: http://openmetadata-server:8585/api
    authProvider: openmetadata
    securityConfig:
      jwtToken: "REPLACE_WITH_INGESTION_BOT_JWT"
