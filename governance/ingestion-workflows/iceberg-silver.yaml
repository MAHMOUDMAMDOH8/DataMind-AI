# ── OpenMetadata Ingestion: Iceberg Silver Layer ──────────────────────────────
# Registers all 13 silver tables from the Nessie catalog into OpenMetadata.
#
# Silver tables (domain.entity):
#   crm_customer_registrations, crm_profile_updates,
#   billing_calls, billing_sms,
#   network_data_sessions, network_metrics, qos_reports,
#   payments, recharges, roaming_events,
#   support_tickets, complaints, ticket_resolutions
#
# Run inside the openmetadata-ingestion container:
#   metadata ingest -c /opt/workflows/iceberg-silver.yaml
# ─────────────────────────────────────────────────────────────────────────────

source:
  type: Iceberg
  serviceName: datamind-iceberg-silver
  serviceConnection:
    config:
      type: Iceberg
      catalog:
        name: nessie
        connection:
          type: IcebergNessieCatalog
          catalogURL: http://nessie:19120/api/v1
          warehouseLocation: s3://warehouse/
          configProperties:
            s3.endpoint: http://minio:9000
            s3.access-key-id: admin
            s3.secret-access-key: password
            s3.path-style-access: "true"
  sourceConfig:
    config:
      type: DatabaseMetadata
      databaseFilterPattern:
        includes:
          - "silver"
      schemaFilterPattern:
        includes:
          - ".*"
      tableFilterPattern:
        includes:
          - ".*"
      includeViews: false
      includeTags: true
      markDeletedTables: true
      autoClassification: true

sink:
  type: metadata-rest
  config: {}

ingestionPipelineName: ingest-iceberg-silver

workflowConfig:
  loggerLevel: INFO
  openMetadataServerConfig:
    hostPort: http://openmetadata-server:8585/api
    authProvider: openmetadata
    securityConfig:
      jwtToken: "REPLACE_WITH_INGESTION_BOT_JWT"
